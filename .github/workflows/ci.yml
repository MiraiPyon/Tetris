name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
          cache: true
          cache-dependency-path: Tetris.csproj

      - name: Restore dependencies
        run: dotnet restore Tetris.csproj

      - name: Build
        run: dotnet build Tetris.csproj -c Release --no-restore
